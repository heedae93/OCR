# ============================================================================
#  BBOCR Configuration
# ============================================================================
#
#  이 파일 하나로 전체 시스템의 모든 설정을 관리합니다.
#  수정 후 서버를 재시작하면 적용됩니다.  (./stop.sh && ./start.sh)
#
#  경로는 절대경로(/로 시작)와 상대경로 모두 가능합니다.
#  상대경로는 프로젝트 루트 기준으로 해석됩니다.
#
# ============================================================================


# ──────────────────────────────────────────────────────────────────────────────
#  1. OCR 엔진 설정
# ──────────────────────────────────────────────────────────────────────────────
#  PaddleOCR 기반 텍스트 인식 엔진의 동작을 제어합니다.
#
ocr:
  engine: pp_structure
  # GPU 사용 여부  (true: GPU 가속 / false: CPU 전용)
  use_gpu: true

  # 단일 GPU 모드에서 사용할 GPU 번호 (nvidia-smi 기준 index)
  gpu_id: 0

  # CPU 병렬 스레드 수 (GPU 모드에서도 전처리에 활용)
  cpu_threads: 64

  # OCR 배치 크기 (한 번에 처리할 이미지 수)
  batch_size: 32

  # 텍스트 인식(recognition) 배치 수
  #   1이 가장 빠름 (라인 단위 처리 최적화)
  rec_batch_num: 1

  # 텍스트 감지 시 이미지 축소 한계 (px)
  #   값이 클수록 작은 텍스트도 감지하지만 속도가 느려짐
  #   권장: 2000 (정확도) — tiling 사용 시 타일 단위 해상도 기준
  detection_limit_side_len: 2000

  # PaddleOCR 라인 병합 사용 여부
  #   false: PaddleOCR가 반환한 라인 bbox를 그대로 사용 (권장)
  #   true:  단어 수준 bbox를 라인으로 병합
  enable_line_merge: false

  # OCR 언어 (korean, chinese, english, japan 등)
  lang: korean

  # 커스텀 인식 모델 경로 (상대경로 가능)
  recognition_model_dir: data/models/best_0828
  ppstructure_layout_model: "PP-DocLayout-L"
  ppstructure_recognition_model: "PP-OCRv5_server_rec"
  use_table_recognition: true
  table_model_name: "SLANet_plus"
  wireless_table_model_name: "SLANet"

  # ── Table Transformer (Microsoft DETR 기반) ──
  table_recognition_backend: "hybrid"
  table_transformer:
    detection_model: "microsoft/table-transformer-detection"
    structure_model: "microsoft/table-transformer-structure-recognition-v1.1-all"
    detection_threshold: 0.9
    structure_threshold: 0.6

  # ── 타일링(Chunking) 설정 ──
  tiling:
    enabled: true
    tile_size: 1200
    overlap: 200
    nms_iou_threshold: 0.3

  # ── 읽기 순서(Reading Order) 설정 ──
  use_smart_reading_order: true
  reading_order:
    row_overlap_threshold: 0.4
    column_gap_ratio: 0.20
    column_balance_ratio: 0.35


# ──────────────────────────────────────────────────────────────────────────────
#  2. GPU / 병렬 처리 설정
# ──────────────────────────────────────────────────────────────────────────────
gpu:
  cuda_visible_devices: "0"
  available_gpu_ids: [0]
  auto_detect_libs: true
  cudnn_lib_path: ""
  cublas_lib_path: ""


# ──────────────────────────────────────────────────────────────────────────────
#  3. 디렉토리 설정
# ──────────────────────────────────────────────────────────────────────────────
directories:
  input_image_dir: ""
  upload_dir: "data/raw"
  output_pdf_dir: "data/processed"
  log_dir: "data/logs"
  debug_dir: "data/debug"


# ──────────────────────────────────────────────────────────────────────────────
#  4. 폰트 설정
# ──────────────────────────────────────────────────────────────────────────────
fonts:
  candidates:
    - path: "/usr/share/fonts/truetype/nanum/NanumGothic.ttf"
      name: "NanumGothic"
    - path: "/System/Library/Fonts/AppleGothic.ttf"
      name: "AppleGothic"
    - path: "C:/Windows/Fonts/malgun.ttf"
      name: "MalgunGothic"
    - path: "C:/Windows/Fonts/gulim.ttc"
      name: "Gulim"

  max_font_size: 90
  korean_min_size: 7
  english_min_size: 6


# ──────────────────────────────────────────────────────────────────────────────
#  5. PDF 처리 설정
# ──────────────────────────────────────────────────────────────────────────────
pdf_processing:
  dpi: 400
  fast_mode: true
  standard_resolution:
    default_dpi: 300
    max_dpi: 600
    min_dpi: 150
    scale_factor: 1.0
  enable_parallel: true
  parallel_workers: null


# ──────────────────────────────────────────────────────────────────────────────
#  6. 이미지 전처리 설정
# ──────────────────────────────────────────────────────────────────────────────
preprocessing:
  enable: false
  preserve_size: true


# ──────────────────────────────────────────────────────────────────────────────
#  7. 텍스트 레이어 설정
# ──────────────────────────────────────────────────────────────────────────────
text_coverage:
  expand_click_area: true
  multi_layer_rendering: false
  low_confidence_threshold: 0.3
  bbox_expansion_pixels: 0
  font_size_boost: 1.0
  coverage_fill_ratio: 1.0
  width_overshoot_ratio: 1.02
  enable_text_recovery: false


# ──────────────────────────────────────────────────────────────────────────────
#  8. 레이아웃 감지 설정
# ──────────────────────────────────────────────────────────────────────────────
layout_detection:
  enabled: true
  model_name: "PP-DocLayout-L"
  iou_threshold: 0.5
  max_dimension: 1400
  cache_enabled: true


# ──────────────────────────────────────────────────────────────────────────────
#  9. 다단(컬럼) 감지 설정
# ──────────────────────────────────────────────────────────────────────────────
column_detection:
  enable_debug_output: false
  confidence_threshold: 0.05
  min_blocks_for_detection: 4


# ──────────────────────────────────────────────────────────────────────────────
#  10. 파일 처리 설정
# ──────────────────────────────────────────────────────────────────────────────
file_processing:
  supported_image_extensions: ["*.png", "*.jpg", "*.jpeg", "*.bmp", "*.tiff", "*.tif"]
  supported_pdf_extensions: ["*.pdf"]


# ──────────────────────────────────────────────────────────────────────────────
#  11. LLM 및 외부 검색 연동 (요약/인용문 추출)
# ──────────────────────────────────────────────────────────────────────────────
llm_integration:
  enabled: true
  api_url: "http://211.233.58.220:8079"
  model_name: "exaone3.5:latest"
  enable_web_search: true
  max_file_size_mb: 50


# ──────────────────────────────────────────────────────────────────────────────
#  12. 성능 최적화 설정
# ──────────────────────────────────────────────────────────────────────────────
performance:
  text_alpha: 0.01
  gc_interval_pages: 8
  enable_memory_cleanup: true


# ──────────────────────────────────────────────────────────────────────────────
#  13. 기본 사용자 설정
# ──────────────────────────────────────────────────────────────────────────────
user:
  default_id: "user001"
  default_name: "Admin"
  default_email: "user@email.com"


# ──────────────────────────────────────────────────────────────────────────────
#  14. 데이터베이스 설정
# ──────────────────────────────────────────────────────────────────────────────
database:
  url: "postgresql+psycopg2://ocr_user:1234@192.168.0.231:3306/ocr_db?client_encoding=utf8"


# ──────────────────────────────────────────────────────────────────────────────
#  15. Redis 설정 (Celery OCR 작업 큐 브로커)
# ──────────────────────────────────────────────────────────────────────────────
redis:
  url: "redis://localhost:6379/0"


# ──────────────────────────────────────────────────────────────────────────────
#  16. 서버 설정
# ──────────────────────────────────────────────────────────────────────────────
server:
  backend:
    host: 0.0.0.0
    port: 6015
  frontend:
    host: 0.0.0.0
    port: 6017
  debug: false
  log_level: "INFO"
  cors_origins:
    - "*"
    - http://localhost:6017
    - http://127.0.0.1:6017
    - http://192.168.0.69:6017
    - http://192.168.0.69:5017
