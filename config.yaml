# ============================================================================
#  BBOCR Configuration
# ============================================================================
#
#  이 파일 하나로 전체 시스템의 모든 설정을 관리합니다.
#  수정 후 서버를 재시작하면 적용됩니다.  (./stop.sh && ./start.sh)
#
#  경로는 절대경로(/로 시작)와 상대경로 모두 가능합니다.
#  상대경로는 프로젝트 루트 기준으로 해석됩니다.
#
# ============================================================================


# ──────────────────────────────────────────────────────────────────────────────
#  1. OCR 엔진 설정
# ──────────────────────────────────────────────────────────────────────────────
#  PaddleOCR 기반 텍스트 인식 엔진의 동작을 제어합니다.
#
ocr:
  # GPU 사용 여부  (true: GPU 가속 / false: CPU 전용)
  use_gpu: true

  # 단일 GPU 모드에서 사용할 GPU 번호 (nvidia-smi 기준 index)
  gpu_id: 0

  # CPU 병렬 스레드 수 (GPU 모드에서도 전처리에 활용)
  cpu_threads: 64

  # OCR 배치 크기 (한 번에 처리할 이미지 수)
  batch_size: 32

  # 텍스트 인식(recognition) 배치 수
  #   1이 가장 빠름 (라인 단위 처리 최적화)
  rec_batch_num: 1

  # 텍스트 감지 시 이미지 축소 한계 (px)
  #   값이 클수록 작은 텍스트도 감지하지만 속도가 느려짐
  #   권장: 1200 (속도) ~ 2000 (정확도)
  detection_limit_side_len: 1200

  # PaddleOCR 라인 병합 사용 여부
  #   false: PaddleOCR가 반환한 라인 bbox를 그대로 사용 (권장)
  #   true:  단어 수준 bbox를 라인으로 병합
  enable_line_merge: false

  # OCR 언어 (korean, chinese, english, japan 등)
  lang: korean

  # 커스텀 인식 모델 경로 (상대경로 가능)
  #   예: data/models/best_0828
  recognition_model_dir: data/models/best_0828

  # 사용 가능한 커스텀 모델 목록 (향후 모델 교체 시 활용)
  custom_models:
    best_0828: "data/models/best_0828"
    # best_1012_8M: "data/models/best_1012_8M"

  # ── 읽기 순서(Reading Order) 설정 ──
  #  다단 문서에서 텍스트 블록의 읽기 순서를 지능적으로 정렬합니다.
  #  추가 모델 없이 좌표 기반으로 동작합니다.
  #
  use_smart_reading_order: true
  reading_order:
    # 같은 줄로 판단하는 Y축 겹침 비율 (0.0 ~ 1.0)
    #   높을수록 엄격하게 같은 줄만 묶음
    row_overlap_threshold: 0.4

    # 컬럼으로 분리하는 최소 간격 비율 (페이지 너비 대비)
    column_gap_ratio: 0.08

    # 컬럼당 최소 블록 비율 (너무 적으면 컬럼으로 인정하지 않음)
    column_balance_ratio: 0.25


# ──────────────────────────────────────────────────────────────────────────────
#  2. GPU / 병렬 처리 설정
# ──────────────────────────────────────────────────────────────────────────────
#  여러 GPU를 활용한 병렬 OCR 처리를 설정합니다.
#  GPU가 1장이면 available_gpu_ids를 [0]으로 설정하세요.
#
#  예시)
#    GPU 1장:  cuda_visible_devices: "0"       available_gpu_ids: [0]
#    GPU 2장:  cuda_visible_devices: "0,1"     available_gpu_ids: [0, 1]
#    GPU 3장:  cuda_visible_devices: "1,2,3"   available_gpu_ids: [1, 2, 3]
#
gpu:
  cuda_visible_devices: "0"
  available_gpu_ids: [0]

  # cuDNN / cuBLAS 라이브러리 경로 설정
  #   true:  시스템에서 자동 탐지 (Docker 환경이나 일반 설치 시 권장)
  #   false: 아래 경로를 수동으로 지정 (특수한 conda 환경 등)
  auto_detect_libs: true
  cudnn_lib_path: ""
  cublas_lib_path: ""


# ──────────────────────────────────────────────────────────────────────────────
#  3. 디렉토리 설정
# ──────────────────────────────────────────────────────────────────────────────
#  데이터 저장 경로를 지정합니다. 상대경로는 프로젝트 루트 기준입니다.
#  서버 시작 시 존재하지 않는 디렉토리는 자동 생성됩니다.
#
directories:
  input_image_dir: ""             # 입력 이미지 (비워두면 업로드만 사용)
  upload_dir: "data/raw"          # 사용자 업로드 파일
  output_pdf_dir: "data/processed"  # OCR 처리 결과 PDF
  log_dir: "data/logs"            # 애플리케이션 로그
  debug_dir: "data/debug"         # 디버그 시각화 이미지


# ──────────────────────────────────────────────────────────────────────────────
#  4. 폰트 설정
# ──────────────────────────────────────────────────────────────────────────────
#  검색 가능한 PDF 텍스트 레이어 생성에 사용할 폰트를 지정합니다.
#  candidates 목록을 위에서부터 순서대로 탐색하여 첫 번째로 존재하는 폰트를 사용합니다.
#
#  Linux:   sudo apt install fonts-nanum  (NanumGothic 설치)
#  macOS:   기본 내장 AppleGothic 사용
#  Windows: 기본 내장 MalgunGothic 사용
#
fonts:
  candidates:
    - path: "/usr/share/fonts/truetype/nanum/NanumGothic.ttf"
      name: "NanumGothic"
    - path: "/System/Library/Fonts/AppleGothic.ttf"
      name: "AppleGothic"
    - path: "C:/Windows/Fonts/malgun.ttf"
      name: "MalgunGothic"
    - path: "C:/Windows/Fonts/gulim.ttc"
      name: "Gulim"

  max_font_size: 90       # PDF 텍스트 레이어 최대 폰트 크기 (px)
  korean_min_size: 7      # 한글 최소 폰트 크기
  english_min_size: 6     # 영문 최소 폰트 크기


# ──────────────────────────────────────────────────────────────────────────────
#  5. PDF 처리 설정
# ──────────────────────────────────────────────────────────────────────────────
#  업로드된 PDF를 이미지로 변환할 때의 해상도와 처리 방식을 설정합니다.
#
pdf_processing:
  # PDF → 이미지 변환 DPI
  #   높을수록 정확하지만 처리 시간과 메모리 사용량 증가
  #   권장: 300 (일반) / 400 (고품질 스캔)
  dpi: 400

  # 빠른 처리 모드 (일부 후처리 생략)
  fast_mode: true

  # 해상도 자동 조절 범위
  standard_resolution:
    default_dpi: 300      # 원본 DPI를 알 수 없을 때 기본값
    max_dpi: 600          # 최대 허용 DPI
    min_dpi: 150          # 최소 허용 DPI
    scale_factor: 1.0     # OCR ↔ PDF 렌더링 스케일 매칭 비율

  # 멀티 페이지 병렬 처리
  enable_parallel: true
  parallel_workers: null  # null이면 GPU 수에 맞춰 자동 결정


# ──────────────────────────────────────────────────────────────────────────────
#  6. 이미지 전처리 설정
# ──────────────────────────────────────────────────────────────────────────────
#  OCR 정확도를 높이기 위해 이미지를 사전 보정합니다.
#  enable을 false로 두면 전처리 전체를 건너뜁니다 (속도 우선).
#
preprocessing:
  enable: false

  # 컬러 노이즈 제거 (FastNlMeansDenoising)
  #   스캔 문서의 점/얼룩 노이즈를 제거합니다.
  denoise:
    enabled: true
    h: 6                      # 필터 강도 (높을수록 노이즈 제거 강함, 디테일 손실)
    h_color: 6                # 컬러 채널 필터 강도
    template_window_size: 7   # 패치 크기 (홀수)
    search_window_size: 21    # 탐색 영역 크기 (홀수)

  # 저해상도 이미지 업스케일링
  #   짧은 변이 min_edge보다 작은 이미지만 확대합니다.
  upscale:
    enabled: true
    min_edge: 1600            # 이 길이(px) 미만이면 업스케일
    max_scale: 2.0            # 최대 확대 배율

  # 대비 보정 (CLAHE: Contrast Limited Adaptive Histogram Equalization)
  #   흐릿하거나 저대비 문서의 텍스트를 선명하게 만듭니다.
  clahe:
    enabled: true
    clip_limit: 3.0           # 대비 제한 값 (높을수록 대비 강함)
    tile_grid_size: [8, 8]    # 타일 격자 크기

  # 전처리 후 원본 해상도로 복원 (OCR 좌표 일관성 유지)
  preserve_size: true


# ──────────────────────────────────────────────────────────────────────────────
#  7. 텍스트 레이어 설정
# ──────────────────────────────────────────────────────────────────────────────
#  PDF에 투명 텍스트 레이어를 겹쳐서 "검색 가능한 PDF"를 만듭니다.
#  이 설정은 텍스트가 bbox(바운딩 박스) 안에 얼마나 정확히 맞는지를 제어합니다.
#
text_coverage:
  # 클릭 영역을 bbox보다 약간 넓게 확장 (텍스트 선택 편의)
  expand_click_area: true

  # 다중 레이어 렌더링 (false 권장: 성능 이슈)
  multi_layer_rendering: false

  # 이 신뢰도 이하인 텍스트는 별도 표시
  low_confidence_threshold: 0.3

  # bbox 확장 픽셀 (0이면 정확히 bbox 크기에 맞춤)
  bbox_expansion_pixels: 0

  # 폰트 크기 보정 배율 (1.0 = bbox에 정확히 맞춤)
  font_size_boost: 1.0

  # bbox 내 텍스트 채움 비율 (1.0 = 100% 채움)
  coverage_fill_ratio: 1.0

  # 폭 오버슈트 비율 (OCR 폰트 폭이 부족할 때 약간 키움)
  #   1.0 = 정확히 맞춤, 1.02 = 2% 더 넓게
  width_overshoot_ratio: 1.02

  # 누락 텍스트 복구 (실험적 기능, 속도 저하)
  enable_text_recovery: false


# ──────────────────────────────────────────────────────────────────────────────
#  8. 레이아웃 감지 설정
# ──────────────────────────────────────────────────────────────────────────────
#  PP-DocLayout 모델을 사용하여 문서의 의미론적 영역을 감지합니다.
#  (제목, 본문, 표, 그림, 수식, 참고문헌 등)
#
layout_detection:
  # 레이아웃 감지 활성화 여부 (false로 두면 모든 텍스트를 본문으로 처리)
  enabled: true

  # 레이아웃 감지 모델명 (PaddleX 제공 모델)
  #   "PP-DocLayout-L": 대형 모델 (정확, 느림)
  #   "PP-DocLayout-S": 소형 모델 (빠름, 덜 정확)
  model_name: "PP-DocLayout-L"

  # OCR 블록과 레이아웃 영역 매칭 IoU 임계값
  iou_threshold: 0.5

  # 레이아웃 감지 입력 이미지 최대 크기 (px, 축소하여 속도 향상)
  max_dimension: 1400

  # 페이지별 레이아웃 결과 캐싱 (같은 페이지 재처리 시 속도 향상)
  cache_enabled: true


# ──────────────────────────────────────────────────────────────────────────────
#  9. 다단(컬럼) 감지 설정
# ──────────────────────────────────────────────────────────────────────────────
#  신문, 학술 논문 등 다단 문서에서 컬럼 구조를 자동 감지합니다.
#
column_detection:
  # 디버그 시각화 이미지 출력 (debug_dir에 저장)
  enable_debug_output: false

  # 컬럼 감지 신뢰도 임계값 (0.0 ~ 1.0)
  #   낮을수록 민감하게 감지, 높을수록 확실한 경우만 감지
  confidence_threshold: 0.05

  # 컬럼 감지를 시도하는 최소 텍스트 블록 수
  #   이 수보다 텍스트가 적으면 단일 컬럼으로 처리
  min_blocks_for_detection: 4


# ──────────────────────────────────────────────────────────────────────────────
#  10. 파일 처리 설정
# ──────────────────────────────────────────────────────────────────────────────
file_processing:
  # 지원하는 이미지 형식
  supported_image_extensions:
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.bmp"
    - "*.tiff"
    - "*.tif"

  # 지원하는 문서 형식
  supported_pdf_extensions:
    - "*.pdf"

  # 업로드 파일 크기 제한 (MB)
  max_file_size_mb: 50


# ──────────────────────────────────────────────────────────────────────────────
#  11. 성능 최적화 설정
# ──────────────────────────────────────────────────────────────────────────────
performance:
  # PDF 텍스트 레이어 투명도 (0.0 = 완전 투명, 1.0 = 불투명)
  #   0.01로 설정하면 육안으로 보이지 않으면서 텍스트 선택 가능
  text_alpha: 0.01

  # 가비지 컬렉션 실행 주기 (N 페이지마다)
  #   낮을수록 메모리 절약, 높을수록 속도 향상
  gc_interval_pages: 8

  # 페이지 처리 후 GPU 메모리 정리
  enable_memory_cleanup: true


# ──────────────────────────────────────────────────────────────────────────────
#  12. 기본 사용자 설정
# ──────────────────────────────────────────────────────────────────────────────
#  서버 최초 실행 시 자동 생성되는 기본 사용자 정보입니다.
#
user:
  default_id: "user001"
  default_name: "사용자"
  default_email: "user@email.com"


# ──────────────────────────────────────────────────────────────────────────────
#  14. 데이터베이스 설정
# ──────────────────────────────────────────────────────────────────────────────
#  팀원들과 데이터를 공유하기 위해 외부 DB(MariaDB 등)를 설정할 수 있습니다.
#  비워두면 로컬 SQLite(data/ocr_gen.db)를 사용합니다.
#
database:
  # MariaDB/MySQL 예시 (아이디:ocr_user / 비밀번호:ocr_password / 호스트:192.168.0.231 / DB이름:ocr_db)
  url: "mysql+pymysql://ocr_user:1234@192.168.0.231:3306/ocr_db"

  # SQLite 예시 (기본값)
  # url: "sqlite:///data/ocr_gen.db"

# ──────────────────────────────────────────────────────────────────────────────
#  13. 서버 설정
# ──────────────────────────────────────────────────────────────────────────────
#
#  포트 변경 예시:
#    backend.port를 8080, frontend.port를 3000으로 바꾸면
#    ./stop.sh && ./start.sh 만으로 적용됩니다.
#    CORS와 frontend/.env.local은 자동으로 맞춰집니다.
#
server:
  backend:
    host: 0.0.0.0             # 0.0.0.0 = 모든 네트워크 인터페이스
    port: 6015                # 백엔드 API 포트

  frontend:
    host: 0.0.0.0
    port: 6017                # 프론트엔드 웹 UI 포트

  debug: false                # 디버그 모드 (true: 상세 로그 출력)
  log_level: "INFO"           # 로그 레벨: DEBUG, INFO, WARNING, ERROR

  # CORS 허용 출처 목록
  #   생략하면 frontend 포트를 기반으로 자동 생성됩니다.
  #   외부 IP로 접속하는 경우 아래처럼 추가하세요:
  #
  # cors_origins:
  #   - http://localhost:5017
  #   - http://192.168.0.100:5017
